services:
  wg-website:
    build:
      context: .
      args:
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-https://analytics.auerlytics.at/script.js}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-bacc3661-3fcd-469e-80c5-5893280f766e}
    container_name: wg-website
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-https://analytics.auerlytics.at/script.js}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-bacc3661-3fcd-469e-80c5-5893280f766e}
    networks:
      - webnet
    # If the reverse proxy runs on the host instead of inside webnet,
    # remove the networks block above and use this localhost-only port binding:
    # ports:
    #   - "127.0.0.1:8765:3000"

networks:
  webnet:
    external: true
